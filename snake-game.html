<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .score-item {
            color: #fff;
            font-size: 1.2em;
        }

        .score-item span {
            color: #00ff88;
            font-weight: bold;
        }

        .canvas-wrap {
            position: relative;
            display: inline-block;
        }

        canvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            background: #0f0f23;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            pointer-events: none;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .overlay h2 {
            color: #ff4444;
            margin-bottom: 12px;
            font-size: 2em;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }

        .overlay p {
            font-size: 1.1em;
            margin-bottom: 18px;
        }

        .overlay.paused h2 {
            color: #ffdd44;
            text-shadow: 0 0 10px rgba(255, 221, 68, 0.5);
        }

        .overlay button,
        .game-over button {
            pointer-events: auto;
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .overlay button:hover,
        .game-over button:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .controls {
            margin-top: 20px;
            color: #aaa;
        }

        .controls p {
            margin: 5px 0;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ff4444;
            display: none;
            z-index: 100;
        }

        .game-over h2 {
            color: #ff4444;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .game-over p {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>贪吃蛇</h1>
        <div class="score-board">
            <div class="score-item">得分: <span id="score">0</span></div>
            <div class="score-item">最高分: <span id="highScore">0</span></div>
        </div>
        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div class="overlay" id="startOverlay">
                <h2>贪吃蛇</h2>
                <p>按任意方向键开始游戏</p>
                <button id="startBtn">开始游戏</button>
            </div>
            <div class="overlay paused" id="pauseOverlay">
                <h2>已暂停</h2>
                <p>按空格键继续</p>
            </div>
        </div>
        <div class="controls">
            <p>使用方向键 (↑ ↓ ← →) 或 W A S D 控制蛇的移动</p>
            <p>按空格键暂停/继续游戏</p>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2 id="gameOverTitle">游戏结束!</h2>
        <p>你的得分: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverEl = document.getElementById('gameOver');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const startOverlay = document.getElementById('startOverlay');
        const pauseOverlay = document.getElementById('pauseOverlay');

        let snake, velocity, directionQueue, food, score, highScore;
        let gameState = 'idle'; // idle | running | paused | over (win handled via over)
        let rafId = null;
        let lastTime = 0;
        let stepInterval = 120;
        let accumulator = 0;
        let gridCanvas = null;

        highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        highScoreEl.textContent = highScore;

        function buildGrid() {
            gridCanvas = document.createElement('canvas');
            gridCanvas.width = canvas.width;
            gridCanvas.height = canvas.height;
            const g = gridCanvas.getContext('2d');
            g.fillStyle = '#0f0f23';
            g.fillRect(0, 0, gridCanvas.width, gridCanvas.height);
            g.strokeStyle = '#1a1a3e';
            g.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                g.beginPath();
                g.moveTo(i * gridSize, 0);
                g.lineTo(i * gridSize, gridCanvas.height);
                g.stroke();
                g.beginPath();
                g.moveTo(0, i * gridSize);
                g.lineTo(gridCanvas.width, i * gridSize);
                g.stroke();
            }
        }

        function generateFood() {
            if (snake.length >= tileCount * tileCount) {
                food = null;
                return;
            }
            const free = [];
            const occupied = new Set(snake.map(s => s.x + ',' + s.y));
            for (let x = 0; x < tileCount; x++) {
                for (let y = 0; y < tileCount; y++) {
                    if (!occupied.has(x + ',' + y)) free.push({x, y});
                }
            }
            food = free[Math.floor(Math.random() * free.length)];
        }

        function drawGame() {
            ctx.drawImage(gridCanvas, 0, 0);

            if (food) {
                ctx.fillStyle = '#ff4444';
                ctx.shadowColor = '#ff4444';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(
                    food.x * gridSize + gridSize / 2,
                    food.y * gridSize + gridSize / 2,
                    gridSize / 2 - 2,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.fillStyle = '#00cc6a';
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0;
        }

        function step() {
            if (directionQueue.length) {
                const next = directionQueue.shift();
                if (!(next.x === -velocity.x && next.y === -velocity.y)) {
                    velocity = next;
                }
            }

            const head = {x: snake[0].x + velocity.x, y: snake[0].y + velocity.y};

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return endGame(false);
            }

            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return endGame(false);
                }
            }

            snake.unshift(head);

            if (food && head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                stepInterval = Math.max(60, 120 - Math.floor(score / 50) * 10);
                generateFood();
                if (!food) return endGame(true);
            } else {
                snake.pop();
            }
        }

        function loop(time) {
            if (gameState !== 'running') return;
            if (!lastTime) lastTime = time;
            accumulator += time - lastTime;
            lastTime = time;

            while (accumulator >= stepInterval) {
                accumulator -= stepInterval;
                step();
                if (gameState !== 'running') break;
            }

            drawGame();
            if (gameState === 'running') {
                rafId = requestAnimationFrame(loop);
            }
        }

        function startLoop() {
            lastTime = 0;
            accumulator = 0;
            cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(loop);
        }

        function endGame(win) {
            gameState = 'over';
            cancelAnimationFrame(rafId);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            gameOverTitle.textContent = win ? '恭喜通关!' : '游戏结束!';
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        function startGame() {
            snake = [{x: 10, y: 10}];
            velocity = {x: 1, y: 0};
            directionQueue = [];
            score = 0;
            stepInterval = 120;
            scoreEl.textContent = score;
            generateFood();
            gameOverEl.style.display = 'none';
            startOverlay.classList.remove('show');
            pauseOverlay.classList.remove('show');
            gameState = 'running';
            startLoop();
        }

        function restartGame() {
            startGame();
        }

        function togglePause() {
            if (gameState === 'running') {
                gameState = 'paused';
                cancelAnimationFrame(rafId);
                pauseOverlay.classList.add('show');
            } else if (gameState === 'paused') {
                gameState = 'running';
                pauseOverlay.classList.remove('show');
                startLoop();
            }
        }

        const keyDirs = {
            'ArrowUp': {x: 0, y: -1}, 'w': {x: 0, y: -1}, 'W': {x: 0, y: -1},
            'ArrowDown': {x: 0, y: 1}, 's': {x: 0, y: 1}, 'S': {x: 0, y: 1},
            'ArrowLeft': {x: -1, y: 0}, 'a': {x: -1, y: 0}, 'A': {x: -1, y: 0},
            'ArrowRight': {x: 1, y: 0}, 'd': {x: 1, y: 0}, 'D': {x: 1, y: 0}
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (gameState === 'running' || gameState === 'paused') togglePause();
                return;
            }

            const dir = keyDirs[e.key];
            if (!dir) return;
            e.preventDefault();

            if (gameState === 'idle') {
                startGame();
                return;
            }
            if (gameState !== 'running') return;

            const lastDir = directionQueue.length ? directionQueue[directionQueue.length - 1] : velocity;
            if (dir.x === -lastDir.x && dir.y === -lastDir.y) return;
            if (dir.x === lastDir.x && dir.y === lastDir.y) return;
            if (directionQueue.length < 2) directionQueue.push(dir);
        });

        document.getElementById('startBtn').addEventListener('click', startGame);

        buildGrid();
        snake = [{x: 10, y: 10}];
        velocity = {x: 1, y: 0};
        directionQueue = [];
        food = null;
        score = 0;
        generateFood();
        drawGame();
        startOverlay.classList.add('show');
    </script>
</body>
</html>
